<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="theme-color" content="#1a5c2a">
  <title>風險評估報告｜台北市樹木查詢</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: #f0f4f1; min-height: 100vh; }
    .rr-header {
      background: #1a5c2a; color: #fff; padding: 14px 16px;
      display: flex; align-items: center; gap: 10px;
    }
    .rr-header a { color: rgba(255,255,255,0.8); text-decoration: none; font-size: 0.9rem; }
    .rr-header h1 { font-size: 1rem; font-weight: 700; flex: 1; }

    .rr-body { max-width: 680px; margin: 0 auto; padding: 16px; }

    .card { background: #fff; border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07); padding: 20px; margin-bottom: 16px; }
    .card-title { font-size: 1rem; font-weight: 700; color: #1a5c2a;
      margin-bottom: 14px; padding-bottom: 10px; border-bottom: 2px solid #e8f5e9; }

    .tree-info-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    .tree-info-table td { padding: 6px 4px; border-bottom: 1px solid #f0f0f0; }
    .tree-info-table td:first-child { color: #666; width: 80px; }
    .tree-info-table td:last-child { font-weight: 600; }

    .grade-badge { text-align: center; padding: 24px 20px 16px; }
    .grade-circle {
      width: 90px; height: 90px; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 2.4rem; font-weight: 900; color: #fff; margin-bottom: 10px;
    }
    .grade-label { font-size: 1.1rem; font-weight: 700; margin-bottom: 4px; }
    .grade-desc  { font-size: 0.85rem; color: #666; }

    .report-identity {
      background:
        linear-gradient(180deg, rgba(232,245,233,0.95), rgba(255,255,255,0.98)),
        #fff;
    }
    .identity-kicker { color:#2f7d4a; font-size:0.78rem; font-weight:800; margin-bottom:4px; }
    .identity-name { color:#173f24; font-size:1.45rem; font-weight:900; margin-bottom:6px; }
    .identity-meta { color:#56685b; font-size:0.88rem; line-height:1.6; }
    .public-summary {
      border-left: 5px solid #76b985; background:#fbfdf9;
    }
    .public-summary h2 {
      color:#173f24; font-size:1.05rem; margin-bottom:8px;
    }
    .public-summary p {
      color:#3c5143; font-size:0.92rem; line-height:1.75; margin:0;
    }
    .summary-pill {
      display:inline-flex; align-items:center; padding:4px 10px;
      border-radius:999px; background:#e8f5e9; color:#1a5c2a;
      font-size:0.78rem; font-weight:800; margin-bottom:8px;
    }

    .treatment-list { list-style: none; padding: 0; }
    .treatment-list li { padding: 8px 12px 8px 32px; position: relative;
      border-bottom: 1px solid #f0f0f0; font-size: 0.88rem; }
    .treatment-list li::before { content: '▶'; position: absolute; left: 10px;
      color: #1a5c2a; font-size: 0.7rem; top: 11px; }

    .action-bar { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
    .btn-pdf {
      display: block; width: 100%; padding: 13px; text-align: center;
      font-size: 0.95rem; font-weight: 700; border-radius: 10px;
      cursor: pointer; border: none; background: #1565c0; color: #fff;
    }
    .btn-share {
      display: block; width: 100%; padding: 13px; text-align: center;
      font-size: 0.95rem; font-weight: 700; border-radius: 10px;
      cursor: pointer; border: 2px solid #1a5c2a; background: #fff; color: #1a5c2a;
    }
    .btn-map {
      display: block; width: 100%; padding: 13px; text-align: center;
      font-size: 0.95rem; font-weight: 700; border-radius: 10px;
      text-decoration: none; background: #1a5c2a; color: #fff;
    }

    .loading { text-align: center; padding: 60px 20px; color: #888; font-size: 1rem; }
    .error-msg { background: #fff0f0; color: #c0392b; border: 1px solid #f5c6c6;
      border-radius: 8px; padding: 14px 16px; text-align: center; }

    [hidden] { display: none !important; }
  </style>
</head>
<body>

<header class="rr-header">
  <a href="/">← 地圖</a>
  <h1>🌳 樹木風險評估報告</h1>
</header>

<div class="rr-body">
  <div id="loading" class="loading">載入中…</div>
  <div id="error-wrap" hidden>
    <div class="error-msg" id="error-msg"></div>
    <div style="text-align:center;margin-top:16px;">
      <a href="/" style="color:#1a5c2a;">← 回到地圖</a>
    </div>
  </div>

  <div id="report-wrap" hidden>

    <!-- 民眾版摘要 -->
    <div class="card report-identity" id="rr-tree-identity">
      <div class="identity-kicker">公開樹木風險報告</div>
      <div class="identity-name" id="rr-identity-name">—</div>
      <div class="identity-meta" id="rr-identity-meta">—</div>
    </div>

    <div class="card public-summary" id="public-risk-summary">
      <span class="summary-pill" id="rr-public-status">—</span>
      <h2>民眾可以怎麼看</h2>
      <p id="rr-public-copy">—</p>
    </div>

    <!-- 樹木基本資料 -->
    <div class="card">
      <div class="card-title" id="rr-species">—</div>
      <table class="tree-info-table" id="rr-tree-table"></table>
    </div>

    <!-- 評級 -->
    <div class="card">
      <div class="grade-badge">
        <div class="grade-circle" id="rr-circle">?</div>
        <div class="grade-label" id="rr-label">—</div>
        <div class="grade-desc"  id="rr-desc">—</div>
      </div>

      <div id="rr-grade-a-warning" hidden
           style="background:#fff8e1;border:1px solid #f59e0b;border-radius:8px;
                  padding:10px 14px;margin-bottom:12px;font-size:0.85rem;color:#92400e;">
        <strong>⚠️ A 級重大危害因子：</strong>
        <div id="rr-grade-a-hits" style="margin-top:6px;"></div>
      </div>

      <div style="margin-bottom:12px;">
        <div style="font-weight:700;font-size:0.88rem;margin-bottom:6px;color:#444;">建議處置措施：</div>
        <ul class="treatment-list" id="rr-treatments"></ul>
      </div>

      <div style="font-size:0.78rem;color:#aaa;text-align:right;" id="rr-scores"></div>
    </div>

    <!-- 備注 -->
    <div class="card" id="rr-notes-card" hidden>
      <div class="card-title">現場備注</div>
      <p id="rr-notes" style="font-size:0.9rem;color:#444;margin:0;white-space:pre-wrap;"></p>
    </div>

    <!-- 操作 -->
    <div class="action-bar">
      <button class="btn-pdf" id="rr-pdf-btn" onclick="exportReportPDF()">📄 下載 PDF 報告</button>
      <button class="btn-share" onclick="shareThis()">🔗 複製分享連結</button>
      <a href="/" class="btn-map">回到地圖</a>
    </div>

    <p style="text-align:center;font-size:0.75rem;color:#bbb;margin-top:16px;">
      台北市樹木查詢平台 taipei-trees.org
    </p>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/pdf-font.js"></script>
<script>
const GRADE_COLORS = { A:'#8B0000', B:'#D32F2F', C:'#E65100', D:'#388E3C' };
const PUBLIC_GRADE_COPY = {
  A: '需要立即關注。這代表現場評估發現較高風險，通常會建議儘快安排專業複查或處置。',
  B: '建議安排複查。這代表樹木有需要追蹤的狀況，管理單位可依現場條件安排後續檢查或改善。',
  C: '持續觀察。這代表目前沒有立即性的高風險訊號，但仍建議納入例行巡查。',
  D: '目前狀況穩定。這代表本次評估未見明顯高風險項目，仍會隨日常巡查持續更新。'
};
let _reportData = null;

(async function load() {
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  if (!id) { showError('請提供評估 ID（?id=…）'); return; }

  try {
    const res = await fetch(`${API_BASE}/assessment/${id}`);
    const data = await res.json();
    if (!res.ok) { showError(data.error || '無法載入報告'); return; }
    _reportData = data;
    renderReport(data);
  } catch (e) {
    showError('網路錯誤，請稍後再試');
  }
})();

function renderReport(data) {
  const a = data.assessment || {};
  const tree = data.tree || a.tree || {};
  const grade_info = data.grade_info || a.grade_info || {};
  const treatments = data.treatments || a.treatments || [];
  const grade = a.final_grade || 'D';
  const color = GRADE_COLORS[grade] || '#388E3C';
  const healthScore = a.health_score ?? a.total_score ?? '未提供';
  const criticalCount = a.critical_count ?? '未提供';
  const criticalText = criticalCount === '未提供' ? criticalCount : `${criticalCount} 項`;

  document.getElementById('rr-identity-name').textContent =
    tree?.species_name || '未知樹種';
  document.getElementById('rr-identity-meta').textContent =
    [tree?.registry_code, tree?.district, tree?.managing_unit].filter(Boolean).join(' · ') || `評估編號 #${a.id}`;
  document.getElementById('rr-public-status').textContent =
    grade_info?.label || `${grade} 級`;
  document.getElementById('rr-public-status').style.background = `${color}18`;
  document.getElementById('rr-public-status').style.color = color;
  document.getElementById('rr-public-copy').textContent =
    `${grade_info?.desc || ''}${grade_info?.desc ? '。' : ''}${PUBLIC_GRADE_COPY[grade] || PUBLIC_GRADE_COPY.D}`;

  // 樹木資料
  document.getElementById('rr-species').textContent =
    `🌳 ${tree?.species_name || '未知樹種'}`;
  const assessorName = a.assessor_name || '—';
  const envRiskLabel = a.env_risk_label || a.env_risk || '—';
  const rows = [
    ['樹籍編號', tree?.registry_code],
    ['行政區',   tree?.district],
    ['位置',     tree?.managing_unit],
    ['樹高',     tree?.height_m != null ? `${tree.height_m} m` : null],
    ['胸徑',     tree?.dbh_cm   != null ? `${tree.dbh_cm} cm` : null],
    ['環境風險', envRiskLabel],
    ['評估人員', assessorName],
    ['評估編號', `#${a.id}`],
  ].filter(([,v]) => v);
  document.getElementById('rr-tree-table').innerHTML =
    rows.map(([k,v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join('');

  // 評級
  const circle = document.getElementById('rr-circle');
  circle.textContent = grade; circle.style.background = color;
  document.getElementById('rr-label').textContent = grade_info?.label || `${grade} 級`;
  document.getElementById('rr-desc').style.color = color;
  document.getElementById('rr-desc').textContent = grade_info?.desc || '';

  // 處置措施
  document.getElementById('rr-treatments').innerHTML =
    treatments.length > 0
      ? treatments.map(t => `<li>${t}</li>`).join('')
      : '<li>依現場狀況持續追蹤。</li>';

  // A 級危害
  const hits = a.grade_a_hits || [];
  if (hits.length > 0) {
    document.getElementById('rr-grade-a-warning').hidden = false;
    document.getElementById('rr-grade-a-hits').innerHTML =
      hits.map(h => `<div>• ${h}</div>`).join('');
  }

  // 分數
  document.getElementById('rr-scores').textContent =
    `健康分數：${healthScore} ／ 關鍵因子：${criticalText}`;

  // 備注
  if (a.notes) {
    document.getElementById('rr-notes-card').hidden = false;
    document.getElementById('rr-notes').textContent = a.notes;
  }

  document.getElementById('loading').hidden = true;
  document.getElementById('report-wrap').hidden = false;
}

function showError(msg) {
  document.getElementById('loading').hidden = true;
  document.getElementById('error-msg').textContent = msg;
  document.getElementById('error-wrap').hidden = false;
}

// ── PDF（對齊官方調查表格式）─────────────────────────────────────────────────
async function exportReportPDF() {
  if (!_reportData) return;
  const btn = document.getElementById('rr-pdf-btn');
  btn.disabled = true; btn.textContent = '產生中…';

  try {
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    await loadPdfCjkFont(doc);

    // ── 資料解析 ────────────────────────────────────────
    const a              = _reportData.assessment || {};
    const tree           = _reportData.tree || {};
    const grade_info     = _reportData.grade_info || {};
    const treatments     = _reportData.treatments || [];
    const items_detail   = _reportData.items_detail || [];
    const grade_a_detail = _reportData.grade_a_detail || [];
    const photos         = _reportData.photos || [];

    const grade         = a.final_grade || 'D';
    const healthScore   = a.health_score ?? '—';
    const criticalCount = a.critical_count ?? '—';
    const assessorName  = a.assessor_name || '—';
    const envRiskLabel  = a.env_risk_label || a.env_risk || '—';
    const envRisk       = a.env_risk || 'mid';  // low / mid / high
    // healthLevel：優先用 API 欄位；若非 好/普通/差 則由分數與關鍵因子數反推
    const healthLevelRaw = a.health_level || '';
    const healthScore_n  = typeof a.health_score   === 'number' ? a.health_score   : 0;
    const critCount_n    = typeof a.critical_count === 'number' ? a.critical_count : 0;
    const healthLevel = ['好','普通','差'].includes(healthLevelRaw) ? healthLevelRaw :
      (critCount_n >= 3 || Math.abs(healthScore_n) > 45) ? '差' :
      Math.abs(healthScore_n) > 30 ? '普通' : '好';
    const hits          = a.grade_a_hits || [];

    const GRADE_COLOR = { A:[139,0,0], B:[211,47,47], C:[230,81,0], D:[56,142,60] };
    const gradeColor  = GRADE_COLOR[grade] || GRADE_COLOR.D;

    const now       = new Date().toLocaleDateString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit'});
    // created_at 可能是 "2026/06/08 15:44:39" 或 "2026-06-08T15:44:39"，取前 10 個字元
    const createdAt = String(a.created_at || '').substring(0, 10).replace(/-/g, '/') || now;

    const PHOTO_BASE = new URL(API_BASE).origin;
    const F   = PDF_CJK_FONT_NAME;
    const PW  = 210, M = 12, CW = PW - M * 2;   // page width, margin, content width
    let y = 0;

    // ── 輔助函數 ─────────────────────────────────────────
    function sf(size, style='normal', rgb=[0,0,0]) {
      doc.setFontSize(size); doc.setFont(F, style); doc.setTextColor(...rgb);
    }
    function newPage() {
      doc.addPage(); y = 13;
      doc.setDrawColor(200,210,200); doc.setLineWidth(0.25);
      doc.line(M, 10, PW-M, 10);
      sf(6.5,'normal',[180,180,180]);
      doc.text(`臺北市樹木安全評估報告  ${createdAt}  #${a.id}  taipei-trees.org`, M, 8.5);
      sf(8,'normal');
    }
    function chk(need=10) {
      if (y + need > 283) newPage();
    }
    // 畫有邊框的儲存格（文字自動垂直置中）
    function cell(x, cy, w, h, txt, opts={}) {
      const { bold=false, bg=null, sz=8, align='left', tc=[0,0,0], pad=2, lw=0.25, dc=[140,140,140] } = opts;
      if (bg) { doc.setFillColor(...bg); doc.rect(x,cy,w,h,'F'); }
      doc.setDrawColor(...dc); doc.setLineWidth(lw);
      doc.rect(x, cy, w, h);
      if (!txt && txt !== 0) return;
      sf(sz, bold?'bold':'normal', tc);
      const lines = doc.splitTextToSize(String(txt), w - pad*2);
      const lh = sz * 0.37;
      let ty = cy + h/2 + lh/2 - lh*(lines.length-1)/2 + (sz<=7 ? -0.2 : 0);
      lines.forEach(l => {
        if (align==='center') doc.text(l, x+w/2, ty, {align:'center'});
        else doc.text(l, x+pad, ty);
        ty += lh*1.35;
      });
      sf(8,'normal');
    }
    // 不畫邊框，只填文字
    function txt(x, cy, str, opts={}) {
      const { sz=8.5, bold=false, tc=[0,0,0] } = opts;
      sf(sz, bold?'bold':'normal', tc);
      doc.text(String(str), x, cy);
      sf(8,'normal');
    }
    // 水平線
    function hline(cy, x1=M, x2=PW-M, c=[180,190,180]) {
      doc.setDrawColor(...c); doc.setLineWidth(0.3);
      doc.line(x1, cy, x2, cy);
    }

    // ════════════════════════════════════════════════════
    // 第一頁
    // ════════════════════════════════════════════════════

    // ── 標題列 ──
    doc.setFillColor(26,92,42);
    doc.rect(0,0,PW,14,'F');
    sf(11,'bold',[255,255,255]);
    doc.text('臺北市政府工務局公園處  樹木安全評估調查表', M, 9.5);
    sf(7,'normal',[200,230,200]);
    doc.text('系統輸出版  taipei-trees.org', PW-M, 9.5, {align:'right'});

    y = 17;

    // ── 樹木基本資料（表格）──
    sf(8.5,'bold',[0,0,0]);
    doc.text('樹木基本資料', M, y+4.5);
    y += 7;

    const RH = 7;   // row height
    const LW = 22;  // label col width
    const ox = M;

    // row 1: 管轄單位
    cell(ox,       y, LW,   RH, '管轄單位', {bold:true, bg:[235,245,235], sz:7.5});
    cell(ox+LW,    y, CW-LW,RH, tree.managing_unit||'—', {sz:8});
    y += RH;

    // row 2: 評估時間 | 評估人員 | 樹籍編號
    cell(ox,       y, LW,   RH, '評估時間', {bold:true, bg:[235,245,235], sz:7.5});
    cell(ox+LW,    y, 40,   RH, createdAt,  {sz:8});
    cell(ox+LW+40, y, 26,   RH, '評估人員', {bold:true, bg:[235,245,235], sz:7.5});
    cell(ox+LW+66, y, 42,   RH, assessorName, {sz:8});
    cell(ox+LW+108,y, 18,   RH, '樹籍編號', {bold:true, bg:[235,245,235], sz:7});
    cell(ox+LW+126,y, CW-LW-126, RH, tree.registry_code||'—', {sz:8});
    y += RH;

    // row 3: 樹種 | 地點
    cell(ox,       y, LW,   RH, '樹種',     {bold:true, bg:[235,245,235], sz:7.5});
    cell(ox+LW,    y, 54,   RH, tree.species_name||'—', {sz:8});
    cell(ox+LW+54, y, 18,   RH, '地點',     {bold:true, bg:[235,245,235], sz:7.5});
    cell(ox+LW+72, y, CW-LW-72, RH, `${tree.district||''}${tree.managing_unit ? ' '+tree.managing_unit : ''}` || '—', {sz:8});
    y += RH;

    // row 4: 經緯度
    cell(ox,       y, LW,   RH, '經緯度',   {bold:true, bg:[235,245,235], sz:7.5});
    const latlng = (tree.lat && tree.lng) ? `${tree.lat.toFixed(6)}, ${tree.lng.toFixed(6)}` : '—';
    cell(ox+LW,    y, CW-LW,RH, latlng,     {sz:8});
    y += RH;

    // row 5: 胸高直徑 | 樹高 | 冠幅
    cell(ox,           y, LW+6, RH, '胸高直徑(cm)', {bold:true, bg:[235,245,235], sz:7});
    cell(ox+LW+6,      y, 34,   RH, tree.dbh_cm != null ? `${tree.dbh_cm}` : '—', {sz:8});
    cell(ox+LW+40,     y, 18,   RH, '樹高(m)',      {bold:true, bg:[235,245,235], sz:7});
    cell(ox+LW+58,     y, 34,   RH, tree.height_m != null ? `${tree.height_m}` : '—', {sz:8});
    cell(ox+LW+92,     y, 18,   RH, '冠幅(m)',      {bold:true, bg:[235,245,235], sz:7});
    cell(ox+LW+110,    y, CW-LW-110, RH, tree.crown_m != null ? `${tree.crown_m}` : '—', {sz:8});
    y += RH + 3;

    // ── 重大危害（A 級）──
    doc.setFillColor(60,0,0); doc.setTextColor(255,255,255);
    doc.setFontSize(9); doc.setFont(F,'bold');
    doc.rect(M, y, CW, 7, 'FD');
    doc.text('重大危害（A 級）', PW/2, y+5, {align:'center'});
    y += 7;

    doc.setDrawColor(140,140,140); doc.setLineWidth(0.25);
    doc.rect(M, y, CW, grade_a_detail.length * 6.5 + 3);
    sf(7.5,'normal');
    doc.text('確認樹的目標區有標的物且發生下述重大危害狀況：', M+2, y+5);
    y += 7;
    grade_a_detail.forEach(item => {
      const triggered = item.triggered;
      sf(8, triggered?'bold':'normal', triggered?[150,0,0]:[60,60,60]);
      doc.text(`${triggered?'☑':'□'}  ${item.label}`, M+4, y);
      if (triggered) {
        sf(7.5,'normal',[200,50,50]);
        doc.text('◀ 已觸發', PW-M-2, y, {align:'right'});
      }
      y += 6.5;
    });
    sf(8,'normal');
    y += 2;

    // ── 核章欄 ──
    const sigH = 14;
    chk(sigH+4);
    doc.setDrawColor(140,140,140); doc.setLineWidth(0.25);
    doc.rect(M, y, CW, sigH);
    const sigW = CW/4;
    ['巡查員','單位審核人員','書面審核複評人員','單位主管'].forEach((l,i) => {
      if (i>0) doc.line(M+sigW*i, y, M+sigW*i, y+sigH);
      sf(7.5,'bold',[80,80,80]);
      doc.text(l, M+sigW*i+sigW/2, y+4.5, {align:'center'});
    });
    // 評估人員寫在巡查員欄
    sf(8,'normal');
    doc.text(assessorName, M+sigW/2, y+10, {align:'center'});
    y += sigH + 3;

    // ════════════════════════════════════════════════════
    // 第二頁以後：樹木健康度評估
    // ════════════════════════════════════════════════════
    newPage();

    // 表頭（二欄：評估項目 + 分數）
    const SW = 14;   // 分數欄寬
    const IW = CW - SW;  // 評估項目欄寬
    const TBG = [235,245,235];
    function drawItemsHeader() {
      cell(M,    y, IW, 7, '評估項目（☑ 為選取結果）', {bold:true, bg:TBG, sz:8});
      cell(M+IW, y, SW, 7, '分數', {bold:true, bg:TBG, sz:8, align:'center'});
      y += 7;
    }
    drawItemsHeader();

    const SECTION_LABELS_MAP = {
      crown: '一、樹冠狀況',
      trunk: '二、樹幹狀況',
      root:  '三、根部狀況',
      env:   '四、棲地環境',
    };
    let curSection = '';

    items_detail.forEach(q => {
      // 計算每題所需高度
      sf(8, 'bold');
      const qLines = doc.splitTextToSize(`${q.no}. ${q.title}`, IW - 5);
      let needH = qLines.length * 4.8 + 2;
      q.answers.forEach(ans => {
        sf(7.5, 'normal');
        const sn = typeof ans.score === 'number' ? ans.score : 0;
        const aStr = `☑ ${ans.label}${sn !== 0 ? ` (${ans.score})` : ''}${ans.is_cf ? ' ★關鍵因子' : ''}`;
        const aLines = doc.splitTextToSize(aStr, IW - 9);
        needH += aLines.length * 4.5;
      });
      needH = Math.max(needH + 3, 12);

      const isNewSec = q.section !== curSection;

      // 換頁（一次判斷涵蓋分區標題 + 題目高度，避免分區標題與題目跨頁）
      const spaceNeeded = (isNewSec ? 7 : 0) + needH;
      if (y + spaceNeeded > 283) {
        newPage();
        drawItemsHeader();
      }

      // 新分區：全寬分區標題列
      if (isNewSec) {
        const secLabel = SECTION_LABELS_MAP[q.section] ||
                         String(q.section_label || q.section || '');
        doc.setFillColor(30, 80, 45);
        doc.setDrawColor(30, 80, 45); doc.setLineWidth(0.3);
        doc.rect(M, y, CW, 7, 'FD');
        sf(8.5, 'bold', [255, 255, 255]);
        doc.text(secLabel, M + 4, y + 5);
        sf(8, 'normal');
        y += 7;
        curSection = q.section;
      }

      // 繪製題目列
      const rowTop = y;
      doc.setDrawColor(140, 140, 140); doc.setLineWidth(0.25);
      doc.rect(M, rowTop, IW, needH);

      // 分數欄
      const totalScore = q.answers.reduce((s, ans) => {
        return s + (typeof ans.score === 'number' ? ans.score : 0);
      }, 0);
      cell(M + IW, rowTop, SW, needH, String(totalScore),
           {sz: 9, align: 'center', bold: totalScore < 0,
            tc: totalScore < 0 ? [160, 0, 0] : [60, 60, 60]});

      // 題目標題
      let iy = rowTop + 1.5;
      sf(8, 'bold');
      const qLines2 = doc.splitTextToSize(`${q.no}. ${q.title}`, IW - 5);
      qLines2.forEach(l => { doc.text(l, M + 3, iy + 3.5); iy += 4.8; });
      iy += 0.5;

      // 答案列
      q.answers.forEach(ans => {
        const sn = typeof ans.score === 'number' ? ans.score : 0;
        const scorePart = sn !== 0 ? ` (${ans.score})` : '';
        const cfMark    = ans.is_cf ? ' ★關鍵因子' : '';
        const aStr = `☑ ${ans.label}${scorePart}${cfMark}`;
        sf(7.5, 'normal', ans.is_cf ? [160, 40, 0] : (sn < 0 ? [40, 40, 40] : [100, 100, 100]));
        const aLines = doc.splitTextToSize(aStr, IW - 9);
        aLines.forEach(l => { doc.text(l, M + 6, iy + 3.5); iy += 4.5; });
        iy += 1;
      });
      sf(8, 'normal');

      y += needH;
    });
    y += 4;

    // ── 五、其他有關樹木生長狀態註記事項 ──
    chk(14);
    sf(8.5,'bold');
    doc.text('五、其他有關樹木生長狀態註記事項：', M, y); y += 5;
    if (a.notes) {
      sf(8,'normal');
      const nl = doc.splitTextToSize(a.notes, CW-4);
      nl.forEach(l => { chk(6); doc.text(l, M+2, y); y+=5; });
    } else {
      doc.setDrawColor(180,180,180); doc.setLineWidth(0.2);
      doc.rect(M, y, CW, 10);
      y += 12;
    }
    y += 4;

    // ── 樹木健康度評估總計 ──
    chk(24);
    doc.setDrawColor(140,140,140); doc.setLineWidth(0.25);
    const totalW = CW/2 - 2;
    cell(M,          y, totalW, 8, '樹木健康度評估（總扣分）', {bold:true, bg:TBG, sz:8});
    cell(M+totalW+4, y, totalW, 8, '關鍵因子數量（總計）',    {bold:true, bg:TBG, sz:8});
    y += 8;
    const scoreDisplay = typeof healthScore === 'number' ? `${healthScore} 分` : healthScore;
    const cfDisplay = typeof criticalCount === 'number' ? `${criticalCount} 個` : criticalCount;
    cell(M,          y, totalW, 9, scoreDisplay, {sz:11, align:'center', bold:true, tc:[0,60,0]});
    cell(M+totalW+4, y, totalW, 9, cfDisplay,    {sz:11, align:'center', bold:true, tc: critCount_n>=3?[180,0,0]:[0,60,0]});
    y += 11;

    // 好/普通/差
    ['好','普通','差'].forEach(lvl => {
      const selected = healthLevel === lvl;
      sf(8.5, selected?'bold':'normal', selected?[26,92,42]:[80,80,80]);
      doc.text(`${selected?'☑':'□'} ${lvl}`, M+4, y);
      const desc = {好:'總扣分≦30分',普通:'30分＜總扣分≦45分',差:'總扣分＞45分或關鍵因子≧3個'}[lvl]||'';
      sf(7.5,'normal',[100,100,100]);
      doc.text(`：${desc}`, M+16, y);
      y += 6;
    });
    y += 4;

    // ── 環境公共安全風險度 ──
    chk(30);
    doc.setFillColor(26,92,42); doc.setTextColor(255,255,255);
    doc.rect(M, y, CW, 6.5, 'FD');
    sf(8.5,'bold',[255,255,255]);
    doc.text('環境公共安全風險度', PW/2, y+4.8, {align:'center'});
    y += 6.5;

    const envItems = [
      {code:'low',  label:'低', desc:'民眾無法到達或使用頻率極低之區域'},
      {code:'mid',  label:'中', desc:'園路、草坪、次要道路、一般道路'},
      {code:'high', label:'高', desc:'遊戲場、廁所、主要道路、學校及市場周圍'},
    ];
    envItems.forEach(ei => {
      const sel = envRisk === ei.code;
      doc.setDrawColor(sel?[26,92,42][0]:140, sel?[26,92,42][1]:140, sel?[26,92,42][2]:140);
      doc.setLineWidth(sel?0.5:0.25);
      doc.rect(M, y, CW, 6.5, sel?'FD':'S');
      if (sel) { doc.setFillColor(232,245,233); doc.rect(M,y,CW,6.5,'F'); doc.rect(M,y,CW,6.5); }
      sf(8.5, sel?'bold':'normal', sel?[26,92,42]:[80,80,80]);
      doc.text(`${sel?'☑':'□'} ${ei.label}：${ei.desc}`, M+3, y+4.5);
      y += 6.5;
    });
    y += 5;

    // ── 樹木綜合安全評估矩陣 ──
    chk(40);
    sf(8.5,'bold',[0,0,0]);
    doc.text('樹木綜合安全評估矩陣', M, y); y += 5;

    const matGrade = [
      ['','低','中','高'],
      ['好','D級','D級','D級'],
      ['普通','D級','C級','C級'],
      ['差','D級','C級','B級'],
    ];
    const matCW = CW/4;
    const matH  = 7;
    const matColors = { 'A級':[139,0,0],'B級':[211,47,47],'C級':[230,81,0],'D級':[56,142,60] };
    matGrade.forEach((row, ri) => {
      row.forEach((cell_v, ci) => {
        const isGrade = ri>0 && ci>0;
        const isCurEnv = (ci===1&&envRisk==='low')||(ci===2&&envRisk==='mid')||(ci===3&&envRisk==='high');
        const isCurHlth= (ri===1&&healthLevel==='好')||(ri===2&&healthLevel==='普通')||(ri===3&&healthLevel==='差');
        const isResult  = isGrade && isCurEnv && isCurHlth;
        const gc = matColors[cell_v];
        const bg = isResult ? (gc||[200,200,200]) : (isGrade&&gc ? gc.map(v=>Math.min(255,v+140)) : [240,240,240]);
        const tc = isResult ? [255,255,255] : (ri===0||ci===0 ? [0,0,0] : [60,60,60]);
        doc.setFillColor(...bg); doc.setDrawColor(140,140,140); doc.setLineWidth(0.25);
        doc.rect(M+ci*matCW, y, matCW, matH, 'FD');
        sf(ri===0||ci===0?7.5:8, isResult?'bold':'normal', tc);
        doc.text(cell_v, M+ci*matCW+matCW/2, y+matH/2+2.2, {align:'center'});
      });
      y += matH;
    });
    // 矩陣說明（不使用旋轉，改為水平標注）
    sf(7, 'normal', [100, 100, 100]);
    doc.text('縱軸：樹木健康度　／　橫軸：環境公共安全風險度', M, y + 4);
    y += 8;

    // 評估結果標示
    sf(9.5,'bold', gradeColor);
    doc.text(`本次評估結果：${grade} 級  ${grade_info.label||''}`, M, y);
    sf(8,'normal',[60,60,60]);
    doc.text(grade_info.desc||'', M+80, y);
    y += 8;

    // ── 評估後建議處理方式 ──
    chk(14+treatments.length*6);
    sf(8.5,'bold');
    doc.text('評估後建議處理方式', M, y); y += 5;
    treatments.forEach(t => {
      chk(6);
      sf(8,'normal');
      doc.text(`▶  ${t}`, M+4, y); y += 5.5;
    });
    y += 4;

    // ── 簽名欄 ──
    chk(16);
    hline(y); y += 3;
    sf(8.5,'bold'); doc.text('評估人員確認', M, y); y += 6;
    sf(8,'normal');
    doc.text(`評估人員：${assessorName}`, M+2, y); y += 6;
    doc.text('簽名：＿＿＿＿＿＿＿＿＿＿', M+2, y); y += 6;
    doc.text(`評估日期：${createdAt}`, M+2, y);

    // ════════════════════════════════════════════════════
    // 現場照片（最後幾頁）
    // ════════════════════════════════════════════════════
    if (photos.length > 0) {
      newPage();
      sf(9,'bold');
      doc.text('現場照片', M, y); y += 2;
      hline(y+2); y += 6;

      const PH_W = (CW-6)/2;
      const PH_H = PH_W * 0.75;
      const ANGLE_LBL = {0:'全貌',1:'樹幹',2:'樹冠',3:'根部',4:'損傷特寫'};

      async function fetchImg(url) {
        try {
          const full = url.startsWith('http') ? url : PHOTO_BASE+url;
          const r = await fetch(full);
          if (!r.ok) return null;
          const blob = await r.blob();
          return new Promise(res => {
            const rd = new FileReader();
            rd.onload = ()=>res(rd.result);
            rd.onerror=()=>res(null);
            rd.readAsDataURL(blob);
          });
        } catch { return null; }
      }

      let col=0, rowY=y;
      for (let i=0; i<photos.length; i++) {
        const ph = photos[i];
        const dataURL = await fetchImg(ph.url);
        if (!dataURL) continue;

        if (col===0) {
          rowY=y;
          if (y+PH_H+14 > 283) { newPage(); rowY=y; }
        }
        const px = M + col*(PH_W+6);

        // 照片框邊框
        doc.setDrawColor(180,180,180); doc.setLineWidth(0.3);
        doc.rect(px, rowY, PH_W, PH_H);
        try { doc.addImage(dataURL,'JPEG',px,rowY,PH_W,PH_H); } catch {}

        // 標籤
        const lbl = ph.angle_label || ANGLE_LBL[ph.angle] || `照片 ${i+1}`;
        sf(8,'bold',[40,40,40]);
        doc.text(`${i+1}. ${lbl}`, px, rowY+PH_H+4.5);
        sf(7,'normal',[120,120,120]);
        doc.text(`評估 #${a.id}  ${createdAt}`, px+PH_W, rowY+PH_H+4.5, {align:'right'});

        col++;
        if (col>=2) { col=0; y=rowY+PH_H+10; }
      }
      if (col===1) y=rowY+PH_H+10;
    }

    // ── 頁碼（每頁底部）──
    const pageCount = doc.getNumberOfPages();
    for (let i=1; i<=pageCount; i++) {
      doc.setPage(i);
      sf(6.5,'normal',[160,160,160]);
      doc.text(`台北市樹木查詢平台 taipei-trees.org　第 ${i} / ${pageCount} 頁`,
               PW/2, 291, {align:'center'});
    }

    const treeCode = tree.registry_code || 'unknown';
    doc.save(`樹木風險評估_${treeCode}_${createdAt.replace(/\//g,'-')}.pdf`);
  } catch(e) {
    console.error(e);
    alert('PDF 產生失敗，請重試');
  } finally {
    btn.disabled = false; btn.textContent = '📄 下載 PDF 報告';
  }
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    if (document.querySelector(`script[src="${src}"]`)) { resolve(); return; }
    const s = document.createElement('script');
    s.src = src; s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
}

function shareThis() {
  const url = location.href;
  if (navigator.share) {
    navigator.share({ title: '樹木風險評估報告', url });
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => {
      const btn = document.querySelector('.btn-share');
      if (btn) { btn.textContent = '✅ 已複製！'; setTimeout(() => btn.textContent = '🔗 複製分享連結', 2000); }
    });
  }
}
</script>

</body>
</html>
