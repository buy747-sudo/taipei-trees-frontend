<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="theme-color" content="#1a5c2a">
  <title>風險評估報告｜台北市樹木查詢</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: #f0f4f1; min-height: 100vh; }
    .rr-header {
      background: #1a5c2a; color: #fff; padding: 14px 16px;
      display: flex; align-items: center; gap: 10px;
    }
    .rr-header a { color: rgba(255,255,255,0.8); text-decoration: none; font-size: 0.9rem; }
    .rr-header h1 { font-size: 1rem; font-weight: 700; flex: 1; }

    .rr-body { max-width: 680px; margin: 0 auto; padding: 16px; }

    .card { background: #fff; border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07); padding: 20px; margin-bottom: 16px; }
    .card-title { font-size: 1rem; font-weight: 700; color: #1a5c2a;
      margin-bottom: 14px; padding-bottom: 10px; border-bottom: 2px solid #e8f5e9; }

    .tree-info-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    .tree-info-table td { padding: 6px 4px; border-bottom: 1px solid #f0f0f0; }
    .tree-info-table td:first-child { color: #666; width: 80px; }
    .tree-info-table td:last-child { font-weight: 600; }

    .grade-badge { text-align: center; padding: 24px 20px 16px; }
    .grade-circle {
      width: 90px; height: 90px; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 2.4rem; font-weight: 900; color: #fff; margin-bottom: 10px;
    }
    .grade-label { font-size: 1.1rem; font-weight: 700; margin-bottom: 4px; }
    .grade-desc  { font-size: 0.85rem; color: #666; }

    .report-identity {
      background:
        linear-gradient(180deg, rgba(232,245,233,0.95), rgba(255,255,255,0.98)),
        #fff;
    }
    .identity-kicker { color:#2f7d4a; font-size:0.78rem; font-weight:800; margin-bottom:4px; }
    .identity-name { color:#173f24; font-size:1.45rem; font-weight:900; margin-bottom:6px; }
    .identity-meta { color:#56685b; font-size:0.88rem; line-height:1.6; }
    .public-summary {
      border-left: 5px solid #76b985; background:#fbfdf9;
    }
    .public-summary h2 {
      color:#173f24; font-size:1.05rem; margin-bottom:8px;
    }
    .public-summary p {
      color:#3c5143; font-size:0.92rem; line-height:1.75; margin:0;
    }
    .summary-pill {
      display:inline-flex; align-items:center; padding:4px 10px;
      border-radius:999px; background:#e8f5e9; color:#1a5c2a;
      font-size:0.78rem; font-weight:800; margin-bottom:8px;
    }

    .treatment-list { list-style: none; padding: 0; }
    .treatment-list li { padding: 8px 12px 8px 32px; position: relative;
      border-bottom: 1px solid #f0f0f0; font-size: 0.88rem; }
    .treatment-list li::before { content: '▶'; position: absolute; left: 10px;
      color: #1a5c2a; font-size: 0.7rem; top: 11px; }

    .action-bar { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
    .btn-pdf {
      display: block; width: 100%; padding: 13px; text-align: center;
      font-size: 0.95rem; font-weight: 700; border-radius: 10px;
      cursor: pointer; border: none; background: #1565c0; color: #fff;
    }
    .btn-share {
      display: block; width: 100%; padding: 13px; text-align: center;
      font-size: 0.95rem; font-weight: 700; border-radius: 10px;
      cursor: pointer; border: 2px solid #1a5c2a; background: #fff; color: #1a5c2a;
    }
    .btn-map {
      display: block; width: 100%; padding: 13px; text-align: center;
      font-size: 0.95rem; font-weight: 700; border-radius: 10px;
      text-decoration: none; background: #1a5c2a; color: #fff;
    }

    .loading { text-align: center; padding: 60px 20px; color: #888; font-size: 1rem; }
    .error-msg { background: #fff0f0; color: #c0392b; border: 1px solid #f5c6c6;
      border-radius: 8px; padding: 14px 16px; text-align: center; }

    [hidden] { display: none !important; }
  </style>
</head>
<body>

<header class="rr-header">
  <a href="/">← 地圖</a>
  <h1>🌳 樹木風險評估報告</h1>
</header>

<div class="rr-body">
  <div id="loading" class="loading">載入中…</div>
  <div id="error-wrap" hidden>
    <div class="error-msg" id="error-msg"></div>
    <div style="text-align:center;margin-top:16px;">
      <a href="/" style="color:#1a5c2a;">← 回到地圖</a>
    </div>
  </div>

  <div id="report-wrap" hidden>

    <!-- 民眾版摘要 -->
    <div class="card report-identity" id="rr-tree-identity">
      <div class="identity-kicker">公開樹木風險報告</div>
      <div class="identity-name" id="rr-identity-name">—</div>
      <div class="identity-meta" id="rr-identity-meta">—</div>
    </div>

    <div class="card public-summary" id="public-risk-summary">
      <span class="summary-pill" id="rr-public-status">—</span>
      <h2>民眾可以怎麼看</h2>
      <p id="rr-public-copy">—</p>
    </div>

    <!-- 樹木基本資料 -->
    <div class="card">
      <div class="card-title" id="rr-species">—</div>
      <table class="tree-info-table" id="rr-tree-table"></table>
    </div>

    <!-- 評級 -->
    <div class="card">
      <div class="grade-badge">
        <div class="grade-circle" id="rr-circle">?</div>
        <div class="grade-label" id="rr-label">—</div>
        <div class="grade-desc"  id="rr-desc">—</div>
      </div>

      <div id="rr-grade-a-warning" hidden
           style="background:#fff8e1;border:1px solid #f59e0b;border-radius:8px;
                  padding:10px 14px;margin-bottom:12px;font-size:0.85rem;color:#92400e;">
        <strong>⚠️ A 級重大危害因子：</strong>
        <div id="rr-grade-a-hits" style="margin-top:6px;"></div>
      </div>

      <div style="margin-bottom:12px;">
        <div style="font-weight:700;font-size:0.88rem;margin-bottom:6px;color:#444;">建議處置措施：</div>
        <ul class="treatment-list" id="rr-treatments"></ul>
      </div>

      <div style="font-size:0.78rem;color:#aaa;text-align:right;" id="rr-scores"></div>
    </div>

    <!-- 備注 -->
    <div class="card" id="rr-notes-card" hidden>
      <div class="card-title">現場備注</div>
      <p id="rr-notes" style="font-size:0.9rem;color:#444;margin:0;white-space:pre-wrap;"></p>
    </div>

    <!-- 操作 -->
    <div class="action-bar">
      <button class="btn-pdf" id="rr-pdf-btn" onclick="exportReportPDF()">📄 下載 PDF 報告</button>
      <button class="btn-share" onclick="shareThis()">🔗 複製分享連結</button>
      <a href="/" class="btn-map">回到地圖</a>
    </div>

    <p style="text-align:center;font-size:0.75rem;color:#bbb;margin-top:16px;">
      台北市樹木查詢平台 taipei-trees.org
    </p>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/pdf-font.js"></script>
<script>
const GRADE_COLORS = { A:'#8B0000', B:'#D32F2F', C:'#E65100', D:'#388E3C' };
const PUBLIC_GRADE_COPY = {
  A: '需要立即關注。這代表現場評估發現較高風險，通常會建議儘快安排專業複查或處置。',
  B: '建議安排複查。這代表樹木有需要追蹤的狀況，管理單位可依現場條件安排後續檢查或改善。',
  C: '持續觀察。這代表目前沒有立即性的高風險訊號，但仍建議納入例行巡查。',
  D: '目前狀況穩定。這代表本次評估未見明顯高風險項目，仍會隨日常巡查持續更新。'
};
let _reportData = null;

(async function load() {
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  if (!id) { showError('請提供評估 ID（?id=…）'); return; }

  try {
    const res = await fetch(`${API_BASE}/assessment/${id}`);
    const data = await res.json();
    if (!res.ok) { showError(data.error || '無法載入報告'); return; }
    _reportData = data;
    renderReport(data);
  } catch (e) {
    showError('網路錯誤，請稍後再試');
  }
})();

function renderReport(data) {
  const a = data.assessment || {};
  const tree = data.tree || a.tree || {};
  const grade_info = data.grade_info || a.grade_info || {};
  const treatments = data.treatments || a.treatments || [];
  const grade = a.final_grade || 'D';
  const color = GRADE_COLORS[grade] || '#388E3C';
  const healthScore = a.health_score ?? a.total_score ?? '未提供';
  const criticalCount = a.critical_count ?? '未提供';
  const criticalText = criticalCount === '未提供' ? criticalCount : `${criticalCount} 項`;

  document.getElementById('rr-identity-name').textContent =
    tree?.species_name || '未知樹種';
  document.getElementById('rr-identity-meta').textContent =
    [tree?.registry_code, tree?.district, tree?.managing_unit].filter(Boolean).join(' · ') || `評估編號 #${a.id}`;
  document.getElementById('rr-public-status').textContent =
    grade_info?.label || `${grade} 級`;
  document.getElementById('rr-public-status').style.background = `${color}18`;
  document.getElementById('rr-public-status').style.color = color;
  document.getElementById('rr-public-copy').textContent =
    `${grade_info?.desc || ''}${grade_info?.desc ? '。' : ''}${PUBLIC_GRADE_COPY[grade] || PUBLIC_GRADE_COPY.D}`;

  // 樹木資料
  document.getElementById('rr-species').textContent =
    `🌳 ${tree?.species_name || '未知樹種'}`;
  const assessorName = a.assessor_name || '—';
  const envRiskLabel = a.env_risk_label || a.env_risk || '—';
  const rows = [
    ['樹籍編號', tree?.registry_code],
    ['行政區',   tree?.district],
    ['位置',     tree?.managing_unit],
    ['樹高',     tree?.height_m != null ? `${tree.height_m} m` : null],
    ['胸徑',     tree?.dbh_cm   != null ? `${tree.dbh_cm} cm` : null],
    ['環境風險', envRiskLabel],
    ['評估人員', assessorName],
    ['評估編號', `#${a.id}`],
  ].filter(([,v]) => v);
  document.getElementById('rr-tree-table').innerHTML =
    rows.map(([k,v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join('');

  // 評級
  const circle = document.getElementById('rr-circle');
  circle.textContent = grade; circle.style.background = color;
  document.getElementById('rr-label').textContent = grade_info?.label || `${grade} 級`;
  document.getElementById('rr-desc').style.color = color;
  document.getElementById('rr-desc').textContent = grade_info?.desc || '';

  // 處置措施
  document.getElementById('rr-treatments').innerHTML =
    treatments.length > 0
      ? treatments.map(t => `<li>${t}</li>`).join('')
      : '<li>依現場狀況持續追蹤。</li>';

  // A 級危害
  const hits = a.grade_a_hits || [];
  if (hits.length > 0) {
    document.getElementById('rr-grade-a-warning').hidden = false;
    document.getElementById('rr-grade-a-hits').innerHTML =
      hits.map(h => `<div>• ${h}</div>`).join('');
  }

  // 分數
  document.getElementById('rr-scores').textContent =
    `健康分數：${healthScore} ／ 關鍵因子：${criticalText}`;

  // 備注
  if (a.notes) {
    document.getElementById('rr-notes-card').hidden = false;
    document.getElementById('rr-notes').textContent = a.notes;
  }

  document.getElementById('loading').hidden = true;
  document.getElementById('report-wrap').hidden = false;
}

function showError(msg) {
  document.getElementById('loading').hidden = true;
  document.getElementById('error-msg').textContent = msg;
  document.getElementById('error-wrap').hidden = false;
}

// ── PDF ──
async function exportReportPDF() {
  if (!_reportData) return;
  const btn = document.getElementById('rr-pdf-btn');
  btn.disabled = true; btn.textContent = '產生中…';

  try {
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    await loadPdfCjkFont(doc);

    const a            = _reportData.assessment || {};
    const tree         = _reportData.tree || a.tree || {};
    const grade_info   = _reportData.grade_info || a.grade_info || {};
    const treatments   = _reportData.treatments || a.treatments || [];
    const items_detail = _reportData.items_detail || [];
    const grade_a_detail = _reportData.grade_a_detail || [];
    const grade        = a.final_grade || 'D';
    const healthScore  = a.health_score ?? '—';
    const criticalCount = a.critical_count ?? '—';
    const assessorName = a.assessor_name || '—';
    const envRiskLabel = a.env_risk_label || a.env_risk || '—';
    const gradeColor   = { A:[139,0,0], B:[211,47,47], C:[230,81,0], D:[56,142,60] }[grade] || [56,142,60];
    const pageW = 210, margin = 14, contentW = pageW - margin * 2;
    const now = new Date().toLocaleDateString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit'});

    // ── 輔助：自動換頁 ──────────────────────────────────
    function checkPage(doc, y, need = 8) {
      if (y + need > 282) {
        doc.addPage();
        // 新頁頁首細線
        doc.setDrawColor(200,220,200);
        doc.setLineWidth(0.3);
        doc.line(margin, 10, pageW - margin, 10);
        doc.setFontSize(7); doc.setTextColor(180,180,180);
        doc.setFont(PDF_CJK_FONT_NAME, 'normal');
        doc.text(`台北市樹木風險評估報告  #${a.id}  ${now}`, margin, 8);
        doc.setTextColor(0,0,0);
        return 16;
      }
      return y;
    }

    // ─────────────────────────────────────────────────────
    // 第一頁：標題 + 基本資料 + 評估人員 + 總評等
    // ─────────────────────────────────────────────────────
    let y = 18;
    doc.setFillColor(26, 92, 42);
    doc.rect(0, 0, 210, 26, 'F');
    doc.setTextColor(255,255,255);
    doc.setFontSize(14); doc.setFont(PDF_CJK_FONT_NAME, 'bold');
    doc.text('台北市行道樹風險評估報告', margin, 11);
    doc.setFontSize(8.5); doc.setFont(PDF_CJK_FONT_NAME, 'normal');
    doc.text('Tree Risk Assessment Report  ·  taipei-trees.org', margin, 19);
    doc.setTextColor(0,0,0); y = 34;

    // 樹木基本資料 + 評估資訊（表格形式）
    doc.setFontSize(11); doc.setFont(PDF_CJK_FONT_NAME, 'bold');
    doc.text('壹、樹木基本資料', margin, y); y += 7;

    const infoRows = [
      ['樹籍編號', tree.registry_code || '—'],
      ['樹種',     tree.species_name  || '—'],
      ['行政區',   tree.district      || '—'],
      ['位置',     tree.managing_unit || '—'],
      ['樹高',     tree.height_m != null ? `${tree.height_m} m` : '—'],
      ['胸徑',     tree.dbh_cm   != null ? `${tree.dbh_cm} cm` : '—'],
      ['評估人員', assessorName],
      ['環境風險', envRiskLabel],
      ['評估日期', now],
      ['評估編號', `#${a.id}`],
    ];
    doc.setFontSize(9);
    const col1 = margin, col2 = margin + 26, rowH = 5.8;
    infoRows.forEach(([k, v]) => {
      doc.setFont(PDF_CJK_FONT_NAME, 'bold');   doc.text(k + '：', col1, y);
      doc.setFont(PDF_CJK_FONT_NAME, 'normal'); doc.text(String(v), col2, y);
      y += rowH;
    });
    y += 5;

    // 總評等色塊
    doc.setFillColor(...gradeColor);
    doc.roundedRect(margin, y, contentW, 24, 3, 3, 'F');
    doc.setTextColor(255,255,255);
    doc.setFontSize(30); doc.setFont(PDF_CJK_FONT_NAME, 'bold');
    doc.text(grade, margin + 9, y + 18);
    doc.setFontSize(14); doc.text(grade_info?.label || `${grade} 級`, margin + 28, y + 11);
    doc.setFontSize(9); doc.setFont(PDF_CJK_FONT_NAME, 'normal');
    doc.text(grade_info?.desc || '', margin + 28, y + 19);
    doc.setTextColor(0,0,0); y += 30;

    doc.setFontSize(8); doc.setTextColor(100,100,100);
    doc.text(`健康分數：${healthScore}　／　關鍵因子：${criticalCount} 項`, margin, y);
    doc.setTextColor(0,0,0); y += 8;

    // A 級重大危害（觸發時）
    const hits = a.grade_a_hits || [];
    if (hits.length > 0) {
      y = checkPage(doc, y, 10 + hits.length * 5.5);
      doc.setFillColor(255, 240, 200);
      doc.rect(margin, y - 2, contentW, 8 + hits.length * 5.5, 'F');
      doc.setFontSize(9); doc.setFont(PDF_CJK_FONT_NAME, 'bold');
      doc.setTextColor(150, 60, 0);
      doc.text('⚠ A 級重大危害因子（已觸發）', margin + 3, y + 4);
      y += 8; doc.setFont(PDF_CJK_FONT_NAME, 'normal');
      hits.forEach(h => { doc.text(`• ${h}`, margin + 6, y); y += 5.5; });
      doc.setTextColor(0,0,0); y += 4;
    }

    // 建議處置措施
    if (treatments.length > 0) {
      y = checkPage(doc, y, 14 + treatments.length * 6);
      doc.setFontSize(11); doc.setFont(PDF_CJK_FONT_NAME, 'bold');
      doc.text('貳、建議處置措施', margin, y); y += 7;
      doc.setFontSize(9); doc.setFont(PDF_CJK_FONT_NAME, 'normal');
      treatments.forEach(t => {
        y = checkPage(doc, y);
        doc.text(`▶  ${t}`, margin + 3, y); y += 5.5;
      });
      y += 5;
    }

    // 現場備注
    if (a.notes) {
      y = checkPage(doc, y, 20);
      doc.setFontSize(11); doc.setFont(PDF_CJK_FONT_NAME, 'bold');
      doc.text('參、現場備注', margin, y); y += 7;
      doc.setFontSize(9); doc.setFont(PDF_CJK_FONT_NAME, 'normal');
      const lines = doc.splitTextToSize(a.notes, contentW - 4);
      lines.forEach(line => {
        y = checkPage(doc, y);
        doc.text(line, margin + 3, y); y += 5;
      });
      y += 5;
    }

    // ─────────────────────────────────────────────────────
    // A 級重大危害因子逐項檢核表
    // ─────────────────────────────────────────────────────
    if (grade_a_detail.length > 0) {
      y = checkPage(doc, y, 14 + grade_a_detail.length * 6);
      doc.setFontSize(11); doc.setFont(PDF_CJK_FONT_NAME, 'bold');
      doc.text('肆、A 級重大危害因子檢核', margin, y); y += 7;
      doc.setFontSize(9);
      grade_a_detail.forEach(item => {
        y = checkPage(doc, y);
        const mark = item.triggered ? '▣' : '□';
        doc.setFont(PDF_CJK_FONT_NAME, item.triggered ? 'bold' : 'normal');
        doc.setTextColor(item.triggered ? 150 : 80, item.triggered ? 40 : 80, 0);
        const textLines = doc.splitTextToSize(`${mark} ${item.label}`, contentW - 8);
        textLines.forEach(line => {
          y = checkPage(doc, y);
          doc.text(line, margin + 4, y); y += 5.5;
        });
        doc.setTextColor(0,0,0);
      });
      y += 6;
    }

    // ─────────────────────────────────────────────────────
    // 各題評估問卷完整 Q&A（依分區分組）
    // ─────────────────────────────────────────────────────
    if (items_detail.length > 0) {
      y = checkPage(doc, y, 16);
      doc.setFontSize(11); doc.setFont(PDF_CJK_FONT_NAME, 'bold');
      doc.text('伍、評估問卷各題結果', margin, y); y += 8;

      let currentSection = '';
      items_detail.forEach(q => {
        // 分區標題
        if (q.section_label && q.section_label !== currentSection) {
          currentSection = q.section_label;
          y = checkPage(doc, y, 12);
          doc.setFontSize(10); doc.setFont(PDF_CJK_FONT_NAME, 'bold');
          doc.setTextColor(26, 92, 42);
          doc.text(currentSection, margin, y); y += 6;
          doc.setTextColor(0,0,0);
          // 分隔線
          doc.setDrawColor(180, 220, 180);
          doc.setLineWidth(0.4);
          doc.line(margin, y - 2, pageW - margin, y - 2);
        }

        // 題目
        y = checkPage(doc, y, 10);
        doc.setFontSize(8.5); doc.setFont(PDF_CJK_FONT_NAME, 'bold');
        const qLabel = `Q${q.no}. ${q.title}`;
        const qLines = doc.splitTextToSize(qLabel, contentW - 6);
        qLines.forEach(line => {
          y = checkPage(doc, y);
          doc.text(line, margin + 2, y); y += 5;
        });

        // 答案
        doc.setFont(PDF_CJK_FONT_NAME, 'normal');
        q.answers.forEach(ans => {
          y = checkPage(doc, y);
          const isZero = ans.score === 0 && ans.label !== '（未作答）';
          const cfMark = ans.is_cf ? '【關鍵因子】' : '';
          const scorePart = ans.score !== 0 ? `（${ans.score}分）` : '';
          const ansText = `    ▶ ${ans.label}${scorePart}${cfMark}`;
          doc.setTextColor(ans.is_cf ? 150 : (isZero ? 120 : 40),
                           ans.is_cf ? 40  : (isZero ? 120 : 40),
                           ans.is_cf ? 0   : (isZero ? 120 : 40));
          const ansLines = doc.splitTextToSize(ansText, contentW - 10);
          ansLines.forEach(line => {
            y = checkPage(doc, y);
            doc.text(line, margin + 2, y); y += 4.8;
          });
          doc.setTextColor(0,0,0);
        });
        y += 2;
      });
      y += 4;
    }

    // ─────────────────────────────────────────────────────
    // 陸、現場照片
    // ─────────────────────────────────────────────────────
    const photos = _reportData.photos || [];
    if (photos.length > 0) {
      y = checkPage(doc, y, 20);
      doc.setFontSize(11); doc.setFont(PDF_CJK_FONT_NAME, 'bold');
      doc.setTextColor(0,0,0);
      doc.text('陸、現場照片', margin, y); y += 8;

      // 每排兩張，寬度各半
      const photoW = (contentW - 6) / 2;
      const photoH = photoW * 0.75; // 4:3 比例
      const PHOTO_BASE = new URL(API_BASE).origin; // e.g. https://office.yiren-eco.online

      // 依角度排序：角度標籤對應
      const ANGLE_LABELS = {
        1:'正面（南）',2:'背面（北）',3:'左側（西）',4:'右側（東）',
        5:'樹冠（上）',6:'根部（下）',7:'損傷特寫',8:'環境全景',
      };

      // 把照片轉為 dataURL 後嵌入
      async function fetchPhotoDataURL(url) {
        try {
          const fullUrl = url.startsWith('http') ? url : PHOTO_BASE + url;
          const res = await fetch(fullUrl);
          if (!res.ok) return null;
          const blob = await res.blob();
          return new Promise(resolve => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = () => resolve(null);
            reader.readAsDataURL(blob);
          });
        } catch { return null; }
      }

      // 逐張嵌入（逐列排版）
      let col = 0;
      let rowStartY = y;
      for (let i = 0; i < photos.length; i++) {
        const ph = photos[i];
        const dataURL = await fetchPhotoDataURL(ph.url);
        if (!dataURL) continue;

        if (col === 0) {
          rowStartY = y;
          y = checkPage(doc, y, photoH + 14);
          if (y !== rowStartY) rowStartY = y; // page break happened
        }

        const x = margin + col * (photoW + 6);
        try {
          doc.addImage(dataURL, 'JPEG', x, rowStartY, photoW, photoH);
        } catch { /* 格式不支援，略過 */ }

        // 標籤
        const label = ph.angle_label || ANGLE_LABELS[ph.angle] || `照片 ${i + 1}`;
        doc.setFontSize(7.5); doc.setFont(PDF_CJK_FONT_NAME, 'normal');
        doc.setTextColor(80,80,80);
        doc.text(label, x + photoW / 2, rowStartY + photoH + 4, { align: 'center' });
        doc.setTextColor(0,0,0);

        col++;
        if (col >= 2) {
          col = 0;
          y = rowStartY + photoH + 9;
        }
      }
      if (col === 1) y = rowStartY + photoH + 9; // 奇數張補齊
      y += 4;
    }

    // ─────────────────────────────────────────────────────
    // 評估人員確認欄（最後一頁底部）
    // ─────────────────────────────────────────────────────
    y = checkPage(doc, y, 30);
    doc.setDrawColor(180, 200, 180);
    doc.setLineWidth(0.4);
    doc.line(margin, y, pageW - margin, y); y += 6;
    doc.setFontSize(9); doc.setFont(PDF_CJK_FONT_NAME, 'bold');
    doc.text('評估人員確認', margin, y); y += 7;
    doc.setFontSize(9); doc.setFont(PDF_CJK_FONT_NAME, 'normal');
    doc.text(`評估人員：${assessorName}`, margin + 4, y); y += 7;
    doc.text('簽名：＿＿＿＿＿＿＿＿＿＿＿＿', margin + 4, y); y += 7;
    doc.text(`評估日期：${now}`, margin + 4, y);

    // 頁尾（所有頁面）
    const pageCount = doc.getNumberOfPages();
    for (let i = 1; i <= pageCount; i++) {
      doc.setPage(i);
      doc.setFontSize(7); doc.setTextColor(160,160,160);
      doc.setFont(PDF_CJK_FONT_NAME, 'normal');
      doc.text(
        `台北市樹木查詢平台 taipei-trees.org　第 ${i} / ${pageCount} 頁`,
        pageW / 2, 292, { align: 'center' }
      );
      doc.setTextColor(0,0,0);
    }

    const treeCode = tree?.registry_code || 'unknown';
    doc.save(`樹木風險評估_${treeCode}_${now.replace(/\//g,'-')}.pdf`);
  } catch(e) {
    console.error(e);
    alert('PDF 產生失敗，請重試');
  } finally {
    btn.disabled = false; btn.textContent = '📄 下載 PDF 報告';
  }
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    if (document.querySelector(`script[src="${src}"]`)) { resolve(); return; }
    const s = document.createElement('script');
    s.src = src; s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
}

function shareThis() {
  const url = location.href;
  if (navigator.share) {
    navigator.share({ title: '樹木風險評估報告', url });
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => {
      const btn = document.querySelector('.btn-share');
      if (btn) { btn.textContent = '✅ 已複製！'; setTimeout(() => btn.textContent = '🔗 複製分享連結', 2000); }
    });
  }
}
</script>
