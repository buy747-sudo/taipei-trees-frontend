      - heading "🌲 台北市最常見的行道樹種類" [level=2] [ref=e60]
      - paragraph [ref=e61]: 台北市行道樹種類繁多，從熱帶的榕樹、樟樹，到季節感強的楓香、阿勃勒，構成了台北市獨特的綠色街景。以下是最常在台北市行道樹中看到的幾種：
      - generic [ref=e62]:
        - generic [ref=e63]:
          - heading "榕樹" [level=4] [ref=e64]
          - generic [ref=e65]: Ficus microcarpa
          - paragraph [ref=e66]: 台北市行道樹中的天王！氣根垂掛、樹冠寬大，夏天遮蔭效果最好，在台灣各地最為常見。
        - generic [ref=e67]:
          - heading "樟樹" [level=4] [ref=e68]
          - generic [ref=e69]: Cinnamomum camphora
          - paragraph [ref=e70]: 葉片有淡淡的樟腦香氣，揉一下更明顯。台北市老樟樹不少，很多已達受保護等級。
        - generic [ref=e71]:
          - heading "小葉欖仁" [level=4] [ref=e72]
          - generic [ref=e73]: Terminalia mantaly
          - paragraph [ref=e74]: 傘狀樹形優美，層次分明像日本漫畫裡的樹。近年台北市大量種植於安全島。
        - generic [ref=e75]:
          - heading "印度橡膠樹" [level=4] [ref=e76]
          - generic [ref=e77]: Ficus elastica
          - paragraph [ref=e78]: 大片墨綠色葉，有白色乳汁。常見於公園與校園，部分植株樹齡驚人。
        - generic [ref=e79]:
          - heading "阿勃勒" [level=4] [ref=e80]
