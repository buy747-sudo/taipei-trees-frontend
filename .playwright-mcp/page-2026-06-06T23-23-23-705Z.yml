    - generic [ref=e24]:
      - heading "🌿 台北市行道樹每年「吸走」多少碳？" [level=2] [ref=e25]
      - paragraph [ref=e26]:
        - text: 每次走在台北市的林蔭大道，有沒有想過——這些台北市行道樹除了遮蔭，還在默默做一件很重要的事：
        - strong [ref=e27]: 固碳
        - text: 。
      - paragraph [ref=e28]: 樹木透過光合作用，把空氣中的二氧化碳（CO₂）轉化成木材、葉片、根部，讓碳「鎖」在樹體裡面，這就是所謂的固碳。簡單說：樹木是大自然的「碳吸塵器」。
      - generic [ref=e29]:
        - strong [ref=e30]: 📊 算給你看：
        - text: 一棵成熟榕樹每年固碳約
        - strong [ref=e31]: 12 公斤 CO₂
        - text: ，等於少開車 60 公里的排放量。
        - text: 台北市 92,776 棵行道樹加起來，每年固碳量相當於
        - strong [ref=e32]: 數千台汽車少跑一整年！
      - paragraph [ref=e33]: 更厲害的是，台北市行道樹除了固碳，還能：
      - list [ref=e34]:
        - listitem [ref=e35]:
          - text: 🌡️
          - strong [ref=e36]: 降低體感溫度 3–5°C
          - text: ——台北夏天你需要這個
        - listitem [ref=e37]: 💨 過濾空氣中的懸浮粒子（PM2.5）
        - listitem [ref=e38]: 🌧️ 減少都市熱島效應、降低暴雨逕流
        - listitem [ref=e39]: 🐦 提供鳥類與昆蟲的棲息空間
        - listitem [ref=e40]: 😊 有研究證明：看到綠色植物能降低人的壓力指數
      - img "陽光穿透樹葉的特寫" [ref=e42]
    - generic [ref=e43]:
      - heading "⭐ 台北市受保護樹木——活過兩百年的見證者" [level=2] [ref=e44]
      - paragraph [ref=e45]:
        - text: 台北市有
        - strong [ref=e46]: 3,874 棵
        - text: 受保護樹木，都是樹齡、樹徑、樹高達到一定標準，或具有特殊歷史、文化意義的珍貴老樹。一旦被列為受保護樹木，就不能隨意移植或砍除。
      - generic [ref=e47]:
        - strong [ref=e48]: 什麼樣的樹才能被「受保護」？
        - text: 依台北市受保護樹木認定標準，通常符合下列其中一項：
        - text: ① 胸徑達 80 公分以上的老樹
        - text: ② 樹齡達 50 年以上
        - text: ③ 具有歷史、文化、生態或景觀重要性
      - paragraph [ref=e49]: 走在台北市街頭，如果看到某棵樹特別粗壯、氣根垂掛、樹幹上掛著橢圓形的「受保護樹木」標牌——那棵樹可能已經站在那裡超過一百年，默默見證了這座城市從農地變成現代都市的整個過程。
      - paragraph [ref=e50]: 用本站的「受保護」篩選按鈕，就可以在地圖上看到台北市所有受保護老樹的位置（金色星星 ⭐），點開還能看到它的樹齡與樹種。
      - generic [ref=e51]:
