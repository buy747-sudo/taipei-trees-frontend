    - generic [ref=e95]:
      - heading "📷 台北市行道樹 QR Code——每棵樹都有自己的身分證" [level=2] [ref=e96]
      - paragraph [ref=e97]: 台北市政府為大多數行道樹建立了電子樹籍，並在樹牌上貼有 QR Code。掃描後可以查到：樹種學名、樹高、胸徑、樹齡、行政區、每年固碳量等完整資料。
